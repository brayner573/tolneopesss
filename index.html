<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Dota Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #111827, #020617);
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

nav h1 {
    color: #22c55e;
}

nav a {
    color: white;
    text-decoration: none;
    background: #22c55e;
    padding: 8px 15px;
    border-radius: 5px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h2 {
    font-size: 40px;
}

.hero p {
    color: #94a3b8;
}

/* FORM */
.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #020617;
    padding: 20px;
    border-radius: 10px;
    border: 1px solid #22c55e;
    box-shadow: 0 0 20px rgba(34,197,94,0.2);
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: #111827;
    border: 1px solid #22c55e;
    color: white;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

/* TEAMS */
.team {
    background: #111827;
    padding: 15px;
    margin-top: 10px;
    border-left: 5px solid #22c55e;
    border-radius: 5px;
}

/* ANIMATION */
.card:hover {
    transform: scale(1.02);
    transition: 0.3s;
}
</style>
</head>

<body>

<nav>
    <h1>⚔ DOTA PRO</h1>
    <a href="https://chat.whatsapp.com/EDLgOCOg7dACXYFtHRhDIu?mode=gi_t" target="_blank">WhatsApp</a>
</nav>

<div class="hero">
    <h2>🔥 Torneo Dota Lima Pro 🔥</h2>
    <p>Registra tu equipo y compite en el torneo más épico</p>
</div>

<div class="container">

    <div class="card">
        <h3>📩 Registrar Equipo</h3>

        <input id="teamName" placeholder="Nombre del equipo">
        <input id="captain" placeholder="Capitán">
        <input id="contact" placeholder="WhatsApp">

        <button onclick="registrar()">Registrar</button>
    </div>

    <div class="card">
        <h3>👥 Equipos Registrados</h3>
        <div id="teams"></div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
// 🔥 PEGA TU CONFIG REAL AQUÍ
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_BUCKET",
  messagingSenderId: "TU_SENDER",
  appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// REGISTRAR
function registrar(){
    let team = document.getElementById("teamName").value;
    let captain = document.getElementById("captain").value;
    let contact = document.getElementById("contact").value;

    if(!team || !captain || !contact){
        alert("Completa todo");
        return;
    }

    db.collection("equipos").add({
        teamName: team,
        captain: captain,
        contact: contact,
        timestamp: Date.now()
    });

    window.open("https://chat.whatsapp.com/EDLgOCOg7dACXYFtHRhDIu?mode=gi_t");
}

// TIEMPO REAL
db.collection("equipos").orderBy("timestamp").onSnapshot(snapshot => {
    let html = "";
    snapshot.forEach(doc => {
        let e = doc.data();
        html += `
        <div class="team">
            <b>${e.teamName}</b><br>
            👑 ${e.captain}<br>
            📱 ${e.contact}
        </div>`;
    });
    document.getElementById("teams").innerHTML = html;
});
</script>

</body>
</html>
